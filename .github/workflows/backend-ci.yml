name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore DeezerStats.sln

      - name: Build
        run: dotnet build DeezerStats.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test DeezerStats.sln
          --no-build
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Publier les résultats de tests
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Résultats tests .NET
          path: backend/TestResults/*.trx
          reporter: dotnet-trx
